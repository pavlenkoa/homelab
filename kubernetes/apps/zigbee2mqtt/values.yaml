# Wrapper chart for Zigbee2MQTT
# Defaults here, environment-specific overrides in values/homelab.yaml

# HTTPRoute configuration (empty by default, set in homelab.yaml)
httproute:
  routes: []

# Authelia extAuth TrafficPolicy (empty by default, set in homelab.yaml)
authPolicy:
  enabled: false

zigbee2mqtt:
  statefulset:
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
