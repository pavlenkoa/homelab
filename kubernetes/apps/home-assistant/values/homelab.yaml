# Home Assistant configuration for homelab cluster
# Environment-specific overrides only

httproute:
  routes:
    - name: home-assistant
      hostname: ha.pavlenko.io
      gateway:
        name: homelab
        namespace: kgateway-system
      service:
        name: home-assistant
        port: 8123

authPolicy:
  enabled: false

home-assistant:
  env:
    - name: TZ
      value: "Europe/Warsaw"

  service:
    type: ClusterIP
    port: 8123

  additionalServices:
    - name: homekit
      port: 21064
      targetPort: 21064
      type: ClusterIP
      protocol: TCP

  initContainers:
    - name: install-hacs
      image: alpine:3.23
      command: ["/bin/sh", "-c"]
      args:
        - |
          if [ ! -d /config/custom_components/hacs ]; then
            echo "HACS not found, installing..."
            wget -qO /tmp/hacs.zip https://github.com/hacs/integration/releases/latest/download/hacs.zip
            mkdir -p /config/custom_components/hacs
            unzip -q /tmp/hacs.zip -d /config/custom_components/hacs
            rm /tmp/hacs.zip
            echo "HACS installed"
          else
            echo "HACS already present, skipping"
          fi
      volumeMounts:
        - name: home-assistant
          mountPath: /config

  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce

  configuration:
    enabled: true
    forceInit: true
    trusted_proxies:
      - 10.0.0.0/8
      - 192.168.0.0/16
    templateConfig: |-
      default_config:

      http:
        use_x_forwarded_for: true
        trusted_proxies:
          {{- range .Values.configuration.trusted_proxies }}
          - {{ . }}
          {{- end }}

      mqtt:

      prometheus:

      frontend:
        themes: !include_dir_merge_named themes

      automation: !include automations.yaml
      script: !include scripts.yaml
      scene: !include scenes.yaml
