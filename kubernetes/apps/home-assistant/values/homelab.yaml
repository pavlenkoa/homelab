# Home Assistant configuration for homelab cluster
# Environment-specific overrides only

httproute:
  routes:
    - name: home-assistant
      hostname: ha.pavlenko.io
      gateway:
        name: homelab
        namespace: kgateway-system
      service:
        name: home-assistant
        port: 8123

authPolicy:
  enabled: false

home-assistant:
  env:
    - name: TZ
      value: "Europe/Warsaw"

  service:
    type: ClusterIP
    port: 8123

  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce

  configuration:
    enabled: true
    forceInit: true
    trusted_proxies:
      - 10.0.0.0/8
      - 192.168.0.0/16
    templateConfig: |-
      default_config:

      http:
        use_x_forwarded_for: true
        trusted_proxies:
          {{- range .Values.configuration.trusted_proxies }}
          - {{ . }}
          {{- end }}

      mqtt:

      prometheus:

      light:
        - platform: group
          name: All Lights
          unique_id: all_lights
          entities:
            - light.light_main_room_lamp
            - light.light_bedroom_1
            - light.light_bedroom_2
            - light.light_kitchen_table
            - light.light_toilet_1
            - light.light_toilet_2
        - platform: group
          name: Bedroom Lights
          unique_id: bedroom_lights
          entities:
            - light.light_bedroom_1
            - light.light_bedroom_2
        - platform: group
          name: Toilet Lights
          unique_id: toilet_lights
          entities:
            - light.light_toilet_1
            - light.light_toilet_2
        - platform: group
          name: Living Lights
          unique_id: living_lights
          entities:
            - light.light_main_room_lamp
            - light.light_kitchen_table

      frontend:
        themes: !include_dir_merge_named themes

      automation: !include automations.yaml
      script: !include scripts.yaml
      scene: !include scenes.yaml
