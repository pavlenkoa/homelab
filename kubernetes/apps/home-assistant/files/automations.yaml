- id: living_room_sunset_reading
  alias: Living Room - Sunset Reading Mode
  description: Transition living lights to evening reading (2700K) at sunset, only if iPhone is home.
  triggers:
  - platform: sun
    event: sunset
  conditions:
  - condition: state
    entity_id: device_tracker.andriis_iphone
    state: home
  actions:
  - action: mqtt.publish
    data:
      topic: zigbee2mqtt/Living Room Lights/set
      payload: '{"scene_recall": 10}'
  mode: single
- id: living_room_arrival
  alias: Living Room - Arrival Lights
  description: Turn on living room lights when iPhone arrives home and sun elevation
    is below 3° (adaptive threshold that works year-round).
  triggers:
  - trigger: state
    entity_id: device_tracker.andriis_iphone
    to: home
  conditions:
  - condition: numeric_state
    entity_id: sun.sun
    attribute: elevation
    below: 3
  actions:
  - choose:
    - conditions:
      - condition: time
        after: '06:00:00'
        before: '22:00:00'
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Living Room Lights/set
          payload: '{"scene_recall": 9}'
    - conditions:
      - condition: time
        after: '22:00:00'
        before: '00:00:00'
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Living Room Lights/set
          payload: '{"scene_recall": 2}'
    default:
    - action: mqtt.publish
      data:
        topic: zigbee2mqtt/Living Room Lights/set
        payload: '{"scene_recall": 2}'
    - action: mqtt.publish
      data:
        topic: zigbee2mqtt/Living Room Lights/set
        payload: '{"brightness": 115, "transition": 1.5}'
  mode: single
- id: living_room_departure
  alias: Living Room - Departure
  description: Turn off living room lights after iPhone has been away 5 minutes.
    Router flips the tracker to not_home within seconds of the phone leaving
    Wi-Fi range, so the 5-min debounce is the sole safeguard against quick walks.
  triggers:
  - trigger: state
    entity_id: device_tracker.andriis_iphone
    to: not_home
    for: '00:05:00'
  conditions:
  - condition: state
    entity_id: light.living_room_lights
    state: 'on'
  actions:
  - action: mqtt.publish
    data:
      topic: zigbee2mqtt/Living Room Lights/set
      payload: '{"state": "OFF", "transition": 3}'
  mode: single
- id: living_room_red_mode
  alias: Living Room - 22:00 Red Mode
  description: Living lights transition to red at 22:00 via Zigbee scene, only if on.
  triggers:
  - platform: time
    at: '22:00:00'
  conditions:
  - condition: state
    entity_id: light.living_room_lights
    state: 'on'
  actions:
  - action: mqtt.publish
    data:
      topic: zigbee2mqtt/Living Room Lights/set
      payload: '{"scene_recall": 4}'
  mode: single
- id: late_night_dim
  alias: 00:00 - Red Dim 45%
  description: Dim living room and bedroom to 45% red at midnight, only if on. Aligns
    with bedroom sensor blackout window.
  triggers:
  - platform: time
    at: '00:00:00'
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: light.living_room_lights
        state: 'on'
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Living Room Lights/set
          payload: '{"brightness": 115, "transition": 30}'
  - choose:
    - conditions:
      - condition: state
        entity_id: light.bedroom_lights
        state: 'on'
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Bedroom Lights/set
          payload: '{"brightness": 115, "transition": 30}'
  mode: single
- id: lights_off_2am
  alias: 02:00 - Lights Off
  description: Safety net - all lights off at 2am via group MQTT topics.
  triggers:
  - platform: time
    at: 02:00:00
  conditions: []
  actions:
  - action: mqtt.publish
    data:
      topic: zigbee2mqtt/Living Room Lights/set
      payload: '{"state": "OFF", "transition": 10}'
  - action: mqtt.publish
    data:
      topic: zigbee2mqtt/Bedroom Lights/set
      payload: '{"state": "OFF", "transition": 10}'
  mode: single
- id: living_room_morning_reading
  alias: Living Room - 06:00 Reading Mode
  description: Living lights transition to reading at 6AM via Zigbee scene, only if on.
  triggers:
  - platform: time
    at: 06:00:00
  conditions:
  - condition: state
    entity_id: light.living_room_lights
    state: 'on'
  actions:
  - action: mqtt.publish
    data:
      topic: zigbee2mqtt/Living Room Lights/set
      payload: '{"scene_recall": {{ 3 if state_attr("sun.sun","elevation") | float(0) >= 3 else 10 }}}'
  mode: single
- id: living_room_knob
  alias: Living Room - Knob Controller
  description: Handles all knob actions for living room. Knob is removed from z2m group,
    all commands go through HA to group MQTT topic. Toggle recalls correct scene for
    time of day or turns off with fade. Rotation controls brightness. Long press toggles
    color.
  triggers:
  - trigger: mqtt
    topic: zigbee2mqtt/Living Room Knob
    id: knob_action
  conditions:
  - condition: template
    value_template: '{{ trigger.payload_json.action in ["toggle", "brightness_step_up",
      "brightness_step_down", "hue_move"] }}'
  actions:
  - variables:
      command: '{{ trigger.payload_json.action }}'
      raw_step: '{{ trigger.payload_json.action_step_size | default(0) }}'
      step: '{% if raw_step not in [None, "", "None"] %}{{ [((raw_step | int(0)) *
        3 / 13) | round(0) | int, 2] | max }}{% else %}3{% endif %}'
      current: '{{ states("input_number.living_room_brightness") | int(254) }}'
      new_up: '{{ [current + (step * 255 / 100) | int, 255] | min | int }}'
      new_down: '{{ [current - (step * 255 / 100) | int, 0] | max | int }}'
      start_brightness: '{{ [(step * 255 / 100) | int, 2] | max }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ command == "toggle" }}'
      - condition: state
        entity_id: light.living_room_lamp
        state: 'off'
      sequence:
      - choose:
        - conditions:
          - condition: time
            after: 06:00:00
            before: '22:00:00'
          sequence:
          - action: mqtt.publish
            data:
              topic: zigbee2mqtt/Living Room Lights/set
              payload: '{"scene_recall": {{ 5 if state_attr("sun.sun","elevation") | float(0) >= 3 else 11 }}}'
        default:
        - action: mqtt.publish
          data:
            topic: zigbee2mqtt/Living Room Lights/set
            payload: '{"scene_recall": 6}'
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Living Room Lights/set
          payload: '{"brightness": {{ [current, 2] | max }}, "transition": 0.5}'
    - conditions:
      - condition: template
        value_template: '{{ command == "toggle" }}'
      - condition: state
        entity_id: light.living_room_lamp
        state: 'on'
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Living Room Lights/set
          payload: '{"state": "OFF", "transition": 0.5}'
    - conditions:
      - condition: template
        value_template: '{{ command == "brightness_step_up" }}'
      - condition: state
        entity_id: light.living_room_lamp
        state: 'off'
      sequence:
      - choose:
        - conditions:
          - condition: time
            after: 06:00:00
            before: '22:00:00'
          sequence:
          - action: mqtt.publish
            data:
              topic: zigbee2mqtt/Living Room Lights/set
              payload: '{"scene_recall": {{ 5 if state_attr("sun.sun","elevation") | float(0) >= 3 else 11 }}}'
        default:
        - action: mqtt.publish
          data:
            topic: zigbee2mqtt/Living Room Lights/set
            payload: '{"scene_recall": 6}'
      - action: input_number.set_value
        target:
          entity_id: input_number.living_room_brightness
        data:
          value: '{{ start_brightness }}'
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Living Room Lights/set
          payload: '{"brightness": {{ start_brightness }}, "transition": 0.3}'
    - conditions:
      - condition: template
        value_template: '{{ command == "brightness_step_up" }}'
      - condition: state
        entity_id: light.living_room_lamp
        state: 'on'
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.living_room_brightness
        data:
          value: '{{ new_up }}'
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Living Room Lights/set
          payload: '{"brightness": {{ new_up }}, "transition": 0.3}'
    - conditions:
      - condition: template
        value_template: '{{ command == "brightness_step_down" }}'
      - condition: state
        entity_id: light.living_room_lamp
        state: 'on'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ new_down > 2 }}'
          sequence:
          - action: input_number.set_value
            target:
              entity_id: input_number.living_room_brightness
            data:
              value: '{{ new_down }}'
          - action: mqtt.publish
            data:
              topic: zigbee2mqtt/Living Room Lights/set
              payload: '{"brightness": {{ new_down }}, "transition": 0.3}'
        default:
        - action: mqtt.publish
          data:
            topic: zigbee2mqtt/Living Room Lights/set
            payload: '{"state": "OFF", "transition": 0.5}'
    - conditions:
      - condition: template
        value_template: '{{ command == "hue_move" }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ state_attr("light.living_room_lamp", "color_mode")
              == "xy" }}'
          sequence:
          - action: mqtt.publish
            data:
              topic: zigbee2mqtt/Living Room Lights/set
              payload: '{"color_temp": 345, "transition": 1}'
        default:
        - action: mqtt.publish
          data:
            topic: zigbee2mqtt/Living Room Lights/set
            payload: '{"color": {"x": 0.69, "y": 0.31}, "transition": 1}'
  mode: restart
