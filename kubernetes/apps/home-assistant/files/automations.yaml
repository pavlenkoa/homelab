- id: bathroom_presence
  alias: Bathroom - Presence
  description: 'Bathroom lights via Zigbee scenes. 06-22 reading, 22-02 red, 02-06
    red dim 40%. Scenes 1/2/7: 1.5s fade. Scenes 3/4/8: 30s for time transitions.'
  triggers:
  - trigger: state
    entity_id: binary_sensor.bathroom_sensor_presence
    to: 'on'
    id: presence_on
  - trigger: state
    entity_id: binary_sensor.bathroom_sensor_presence
    to: 'off'
    id: presence_off
  - trigger: time
    at: '22:00:00'
    id: time_22
  - trigger: time
    at: '02:00:00'
    id: time_02
  - trigger: time
    at: 06:00:00
    id: time_06
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: presence_on
      - condition: time
        after: 06:00:00
        before: '22:00:00'
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Bathroom Lights/set
          payload: '{"scene_recall": {{ 1 if state_attr("sun.sun","elevation") | float(0) >= 3 else 9 }}}'
    - conditions:
      - condition: trigger
        id: presence_on
      - condition: time
        after: '02:00:00'
        before: 06:00:00
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Bathroom Lights/set
          payload: '{"scene_recall": 7}'
    - conditions:
      - condition: trigger
        id: presence_on
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Bathroom Lights/set
          payload: '{"scene_recall": 2}'
    - conditions:
      - condition: trigger
        id: time_22
      - condition: state
        entity_id: binary_sensor.bathroom_sensor_presence
        state: 'on'
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Bathroom Lights/set
          payload: '{"scene_recall": 4}'
    - conditions:
      - condition: trigger
        id: time_02
      - condition: state
        entity_id: binary_sensor.bathroom_sensor_presence
        state: 'on'
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Bathroom Lights/set
          payload: '{"scene_recall": 8}'
    - conditions:
      - condition: trigger
        id: time_06
      - condition: state
        entity_id: binary_sensor.bathroom_sensor_presence
        state: 'on'
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Bathroom Lights/set
          payload: '{"scene_recall": {{ 3 if state_attr("sun.sun","elevation") | float(0) >= 3 else 10 }}}'
    - conditions:
      - condition: trigger
        id: presence_off
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Bathroom Lights/set
          payload: '{"state": "OFF", "transition": 3}'
