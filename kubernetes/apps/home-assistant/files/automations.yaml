      - condition: state
        entity_id: binary_sensor.bedroom_sensor_presence
        state: 'on'
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Bedroom Lights/set
          payload: '{"scene_recall": 3}'
    - conditions:
      - condition: trigger
        id: presence_off
      sequence:
      - action: mqtt.publish
        data:
          topic: zigbee2mqtt/Bedroom Lights/set
          payload: '{"state": "OFF", "transition": 3}'
  mode: single
