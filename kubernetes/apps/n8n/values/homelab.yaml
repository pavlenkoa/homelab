# n8n configuration for homelab cluster
# Environment-specific overrides only

n8n:
  # Ingress disabled — using kgateway HTTPRoute
  ingress:
    enabled: false

httproute:
  routes:
    - name: n8n
      hostname: n8n.pavlenko.io
      gateway:
        name: homelab
        namespace: kgateway-system
      service:
        name: n8n
        port: 80

  main:
    config:
      n8n:
        host: "n8n.pavlenko.io"
        protocol: "https"
