# Wrapper chart for victoria-metrics-single
# Defaults here, environment-specific overrides in values/homelab.yaml

victoria-metrics-single:
  server:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 1000m

    retentionPeriod: 90d

    extraArgs:
      "dedup.minScrapeInterval": "5s"
      "memory.allowedPercent": "60"
      "storage.cacheSizeIndexDBDataBlocks": "64MB"
      "storage.cacheSizeIndexDBIndexBlocks": "32MB"
      "storage.cacheSizeStorageTSID": "64MB"

    service:
      type: ClusterIP
      servicePort: 8428

    persistentVolume:
      enabled: true
      size: 20Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    env:
      - name: VM_LOG_LEVEL
        value: "INFO"

    serviceMonitor:
      enabled: false
