# Wrapper chart for victoria-metrics-single
# Defaults here, environment-specific overrides in values/homelab.yaml

# Vault / ExternalSecret for basic auth
externalSecret:
  refreshInterval: "1h"
  secretName: victoriametrics-basic-auth

vault:
  secretPath: "kv/monitoring/victoriametrics"
  secretStoreName: "vault-backend"

# Basic auth for external push endpoint
basicAuth:
  enabled: true
  targetRoute: victoriametrics

# HTTPRoute configuration (empty by default, set in homelab.yaml)
httproute:
  routes: []

victoria-metrics-single:
  server:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 1000m

    retentionPeriod: 90d

    extraArgs:
      "dedup.minScrapeInterval": "5s"
      "memory.allowedPercent": "60"
      "storage.cacheSizeIndexDBDataBlocks": "64MB"
      "storage.cacheSizeIndexDBIndexBlocks": "32MB"
      "storage.cacheSizeStorageTSID": "64MB"

    service:
      type: ClusterIP
      servicePort: 8428

    persistentVolume:
      enabled: true
      size: 20Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    env:
      - name: VM_LOG_LEVEL
        value: "INFO"

    serviceMonitor:
      enabled: false

# vmalert for recording rules
vmalert:
  enabled: true
  image:
    repository: victoriametrics/vmalert
    tag: v1.139.0@sha256:26f877d5de545e9d7a9a80be10efcc5f3928ee36572d55281363efcc616cb3ad
  evaluationInterval: 1m
  datasource:
    url: http://victoriametrics-victoria-metrics-single-server:8428
  remoteWrite:
    url: http://victoriametrics-victoria-metrics-single-server:8428
  remoteRead:
    url: http://victoriametrics-victoria-metrics-single-server:8428
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 64Mi
      cpu: 100m
  rules:
    groups:
      - name: macos-compat
        rules:
          # Map Darwin memory metrics to Linux equivalents for Node Exporter Full dashboard
          - record: node_memory_MemTotal_bytes
            expr: node_memory_total_bytes{instance="macmini-macos"}
          - record: node_memory_MemFree_bytes
            expr: node_memory_free_bytes{instance="macmini-macos"}
          - record: node_memory_MemAvailable_bytes
            expr: node_memory_free_bytes{instance="macmini-macos"} + node_memory_inactive_bytes{instance="macmini-macos"}
          - record: node_memory_Cached_bytes
            expr: node_memory_inactive_bytes{instance="macmini-macos"}
          - record: node_memory_Buffers_bytes
            expr: node_memory_purgeable_bytes{instance="macmini-macos"}
          - record: node_memory_SwapTotal_bytes
            expr: node_memory_swap_total_bytes{instance="macmini-macos"}
          - record: node_memory_SwapFree_bytes
            expr: node_memory_swap_total_bytes{instance="macmini-macos"} - node_memory_swap_used_bytes{instance="macmini-macos"}
