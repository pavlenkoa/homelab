apiVersion: apps/v1
kind: Deployment
metadata:
  name: gamja
  namespace: irc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gamja
  template:
    metadata:
      labels:
        app: gamja
    spec:
      containers:
        - name: gamja
          image: ghcr.io/pavlenkoa/gamja:latest@sha256:2d4008849c2b87936f3da64415d14634a5ba4329c41f585a242b7189a81a4922
          ports:
            - containerPort: 8081
              name: http
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: app-config
              mountPath: /usr/share/nginx/html/config.json
              subPath: config.json
      volumes:
        - name: nginx-conf
          configMap:
            name: gamja-config
            items:
              - key: default.conf
                path: default.conf
        - name: app-config
          configMap:
            name: gamja-config
            items:
              - key: config.json
                path: config.json
