apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home-dns
  template:
    metadata:
      labels:
        app: home-dns
    spec:
      nodeSelector:
        kubernetes.io/hostname: macmini
      serviceAccountName: home-dns
      dnsPolicy: ClusterFirst
      containers:
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:latest
          env:
            - name: TS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: operator-oauth
                  key: client_id
            - name: TS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: operator-oauth
                  key: client_secret
            - name: TS_HOSTNAME
              value: home-dns
            - name: TS_KUBE_SECRET
              value: home-dns-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_ACCEPT_DNS
              value: "false"
            - name: TS_EXTRA_ARGS
              value: "--advertise-tags=tag:homelab"
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          resources:
            limits:
              memory: 128Mi
              cpu: 100m
        - name: dnsmasq
          image: alpine:latest
          command: ["sh", "-c"]
          args:
            - apk add --no-cache dnsmasq && exec dnsmasq --no-daemon --listen-address=0.0.0.0 --server=192.168.88.1 --no-resolv --no-hosts --no-dhcp-interface= --log-queries
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_BIND_SERVICE
          resources:
            limits:
              memory: 32Mi
              cpu: 50m
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: home-dns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: home-dns
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: home-dns
subjects:
  - kind: ServiceAccount
    name: home-dns
roleRef:
  kind: Role
  name: home-dns
  apiGroup: rbac.authorization.k8s.io
