prometheus-blackbox-exporter:
  config:
    modules:
      http_2xx:
        prober: http
        timeout: 10s
        http:
          valid_status_codes:
            - 200
            - 301
            - 302
            - 401
            - 403
          method: GET
          follow_redirects: false
          preferred_ip_protocol: ip4
          tls_config:
            insecure_skip_verify: true
