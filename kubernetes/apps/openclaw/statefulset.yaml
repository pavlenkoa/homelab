apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openclaw
  namespace: openclaw
spec:
  serviceName: openclaw
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: copy-config
          image: busybox:1.37
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              chown 1000:1000 /home/node/.openclaw
              cp /config-source/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace /home/node/.openclaw/auth /home/node/.openclaw/workspace/tracking/downloads /home/node/.openclaw/workspace/tracking/subscriptions /home/node/.openclaw/workspace/tracking/users
              # Always overwrite AGENTS.md and SOUL.md with our versions
              # The defaults are generic; ours contain both our custom instructions
              # and the important operational bits we want to keep
              cp /config-source/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
              cp /config-source/SOUL.md /home/node/.openclaw/workspace/SOUL.md
              mkdir -p /home/node/.openclaw/cron
              cp /config-source/jobs.json /home/node/.openclaw/cron/jobs.json
              rm -f /home/node/.openclaw/workspace/BOOTSTRAP.md
              chown -R 1000:1000 /home/node/.openclaw/workspace /home/node/.openclaw/openclaw.json /home/node/.openclaw/auth /home/node/.openclaw/cron
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
            - name: openclaw-config
              mountPath: /config-source
      containers:
        - name: openclaw
          image: ghcr.io/pavlenkoa/openclaw:latest@sha256:d3ff6f2ab6ec15fee8f93cf8089450c604b02b0abd6e778dd35a02944ff8455d
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Europe/Kyiv"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ALLOWED_IDS
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_ALLOWED_IDS
            - name: TELEGRAM_ADMIN_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_ADMIN_ID
            - name: TOLOKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: openclaw-toloka
                  key: TOLOKA_USERNAME
            - name: TOLOKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-toloka
                  key: TOLOKA_PASSWORD
            - name: EMBY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-emby
                  key: EMBY_API_KEY
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-tmdb
                  key: TMDB_API_KEY
            - name: OPENCLAW_HOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-hook
                  key: HOOK_TOKEN
          ports:
            - containerPort: 18789
              name: gateway
            - containerPort: 18793
              name: canvas
          livenessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
            - name: media
              mountPath: /media
              subPath: emby
              readOnly: true
      volumes:
        - name: config
          nfs:
            server: 192.168.88.3
            path: /media/openclaw
        - name: openclaw-config
          configMap:
            name: openclaw-config
        - name: media
          persistentVolumeClaim:
            claimName: media-nfs
