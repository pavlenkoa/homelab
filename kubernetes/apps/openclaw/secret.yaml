apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-telegram
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: openclaw-telegram
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: telegram
        property: telegram_bot_token
    - secretKey: TELEGRAM_ALLOWED_IDS
      remoteRef:
        key: telegram
        property: telegram_allowed_ids
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-toloka
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: openclaw-toloka
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: TOLOKA_USERNAME
      remoteRef:
        key: toloka
        property: username
    - secretKey: TOLOKA_PASSWORD
      remoteRef:
        key: toloka
        property: password
