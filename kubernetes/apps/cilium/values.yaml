# Wrapper chart for cilium
# Defaults here, environment-specific overrides in values/homelab.yaml

cilium:
  kubeProxyReplacement: true

  # Keep dedicated Envoy DaemonSet disabled — RPi4 doesn't support
  # 48-bit VA that tcmalloc requires. Gateway API uses the embedded
  # Envoy inside cilium-agent instead.
  envoy:
    enabled: false
    securityContext:
      capabilities:
        keepCapNetBindService: true

  gatewayAPI:
    enabled: true
    hostNetwork:
      enabled: true

  operator:
    replicas: 1

  hubble:
    relay:
      enabled: true
    ui:
      enabled: true
