apiVersion: apps/v1
kind: Deployment
metadata:
  name: mktxp
  namespace: monitoring
  labels:
    app: mktxp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mktxp
  template:
    metadata:
      labels:
        app: mktxp
    spec:
      containers:
        - name: mktxp
          image: ghcr.io/akpw/mktxp:main@sha256:bacca81d76543008021b5c869434c4ae36d4c9176891f6063f0d97c0d08ac955
          ports:
            - containerPort: 49090
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /home/mktxp/mktxp/
              readOnly: true
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      volumes:
        - name: config
          secret:
            secretName: mktxp-config
