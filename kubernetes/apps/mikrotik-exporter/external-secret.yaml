apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mktxp-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: mktxp-config
    creationPolicy: Owner
    template:
      data:
        mktxp.conf: |
          [wroclaw-hap-ax2]
              hostname = 192.168.88.1
              username = {{ `{{ .username }}` }}
              password = {{ `{{ .password }}` }}
        _mktxp.conf: |
          [MKTXP]
              port = 49090
              socket_timeout = 5

              initial_delay_on_failure = 120
              max_delay_on_failure = 900
              delay_inc_div = 5

              bandwidth = False
              bandwidth_test_interval = 420

              minimal_collect_interval = 5

              verbose_mode = False

              fetch_routers_in_parallel = True
              max_worker_threads = 5

              check_for_updates = False
  data:
    - secretKey: username
      remoteRef:
        key: kv/monitoring/mikrotik
        property: username
    - secretKey: password
      remoteRef:
        key: kv/monitoring/mikrotik
        property: password
