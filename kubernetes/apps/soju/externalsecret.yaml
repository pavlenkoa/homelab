apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: soju-bootstrap
  namespace: irc
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: soju-bootstrap
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: soju_username
      remoteRef:
        key: irc
        property: soju_username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: soju_password
      remoteRef:
        key: irc
        property: soju_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
