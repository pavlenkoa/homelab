apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: soju
  namespace: irc
spec:
  serviceName: soju
  replicas: 1
  selector:
    matchLabels:
      app: soju
  template:
    metadata:
      labels:
        app: soju
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: soju
          image: ghcr.io/pavlenkoa/soju:latest@sha256:3ca135a511097c1c2ac14433b73c87207677c42686ae60820533346982c5b408
          ports:
            - containerPort: 8080
              name: soju-ws
          env:
            - name: SOJU_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: soju-bootstrap
                  key: soju_username
            - name: SOJU_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soju-bootstrap
                  key: soju_password
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    set -e
                    for i in $(seq 1 30); do
                      [ -S /var/run/soju/admin.sock ] && break
                      sleep 1
                    done
                    if ! sojuctl -config /etc/soju/soju.cfg user status | grep -qE "^${SOJU_ADMIN_USER}( |:)"; then
                      sojuctl -config /etc/soju/soju.cfg user create \
                        -username "$SOJU_ADMIN_USER" \
                        -password "$SOJU_ADMIN_PASSWORD" \
                        -admin
                    fi
          volumeMounts:
            - name: soju-config
              mountPath: /etc/soju
            - name: data
              mountPath: /data
            - name: admin-sock
              mountPath: /var/run/soju

      volumes:
        - name: soju-config
          configMap:
            name: soju-config
            items:
              - key: soju.cfg
                path: soju.cfg
        - name: admin-sock
          emptyDir: {}
        - name: data
          nfs:
            server: 192.168.88.3
            path: /media/soju-data
