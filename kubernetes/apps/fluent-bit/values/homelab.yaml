# Fluent Bit configuration for homelab cluster
# Environment-specific overrides only

fluent-bit-logs:
  # Run on all nodes including tainted raspberrypi
  tolerations:
    - key: dedicated
      operator: Equal
      value: media
      effect: NoSchedule

  rbac:
    create: true

  config:
    service: |
      [SERVICE]
          Flush         5
          Log_Level     info
          Daemon        off
          Parsers_File  /fluent-bit/etc/parsers.conf
          Parsers_File  /fluent-bit/etc/conf/custom_parsers.conf
          HTTP_Server   On
          HTTP_Listen   0.0.0.0
          HTTP_Port     2020

    inputs: |
      [INPUT]
          Name              tail
          Tag               kube.*
          Path              /var/log/containers/*.log
          multiline.parser  cri
          DB                /var/log/flb_kube.db
          Mem_Buf_Limit     5MB
          Skip_Long_Lines   On
          Refresh_Interval  10

    filters: |
      [FILTER]
          Name                kubernetes
          Match               kube.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     kube.var.log.containers.
          Merge_Log           On
          Keep_Log            Off
          K8S-Logging.Parser  On
          K8S-Logging.Exclude On

      [FILTER]
          Name    grep
          Match   kube.*
          Exclude log failed to retrieve Envoy version

    outputs: |
      [OUTPUT]
          Name                 loki
          Match                kube.*
          Host                 loki.monitoring
          Port                 3100
          Labels               cluster=homelab
          Label_Map_Path       /fluent-bit/etc/conf/loki-label-map.json
          Auto_Kubernetes_Labels off
          Remove_Keys          kubernetes,stream,logtag
          Line_Format          json
          Buffer_Size          256KB

    extraFiles:
      loki-label-map.json: |
        {
          "kubernetes": {
            "namespace_name": "namespace",
            "pod_name": "pod",
            "container_name": "container",
            "host": "node"
          }
        }

fluent-bit-k8s-events:
  rbac:
    create: true
    eventsAccess: true

  # No host log mounts needed for events collection
  daemonSetVolumes: []
  daemonSetVolumeMounts: []

  config:
    service: |
      [SERVICE]
          Flush         5
          Log_Level     info
          Daemon        off
          Parsers_File  /fluent-bit/etc/parsers.conf
          Parsers_File  /fluent-bit/etc/conf/custom_parsers.conf
          HTTP_Server   On
          HTTP_Listen   0.0.0.0
          HTTP_Port     2020

    inputs: |
      [INPUT]
          Name           kubernetes_events
          Tag            k8s_events
          Kube_URL       https://kubernetes.default.svc:443
          DB             /tmp/k8s_events.db

    filters: ""

    outputs: |
      [OUTPUT]
          Name                 loki
          Match                k8s_events
          Host                 loki.monitoring
          Port                 3100
          Labels               job=k8s-events, cluster=homelab
          Auto_Kubernetes_Labels off
          Line_Format          json
          Buffer_Size          256KB
