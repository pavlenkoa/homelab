apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: transmission
  namespace: transmission
spec:
  parentRefs:
    - name: homelab
      namespace: kgateway-system
  hostnames:
    - transmission.pavlenko.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: transmission
          port: 9091
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: transmission-auth
  namespace: transmission
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: transmission
  extAuth:
    extensionRef:
      name: authelia
      namespace: kgateway-system
