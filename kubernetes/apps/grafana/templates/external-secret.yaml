{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "grafana.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.vault.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.secretName }}
    creationPolicy: Owner
    template:
      data:
        admin-user: admin
        admin-password: "{{ `{{ .grafana_admin_password }}` }}"
  data:
    - secretKey: grafana_admin_password
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: grafana_admin_password
{{- end }}
