apiVersion: v1
kind: PersistentVolume
metadata:
  name: claude-code-media-nfs
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.88.3
    path: /media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-code-media-nfs
  namespace: claude-code
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 1Ti
  volumeName: claude-code-media-nfs
