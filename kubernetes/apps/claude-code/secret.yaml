apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: claude-code-telegram
  namespace: claude-code
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: claude-code-telegram
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: telegram
        property: telegram_bot_claude_token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: claude-code-telegram-access
  namespace: claude-code
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: claude-code-telegram-access
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        access.json: |
          {
            "dmPolicy": "allowlist",
            "allowFrom": ["{{ .admin_id }}"],
            "ackReaction": "👀"
          }
  data:
    - secretKey: admin_id
      remoteRef:
        key: telegram
        property: admin_id
---
