apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude-code
  namespace: claude-code
spec:
  serviceName: claude-code
  replicas: 1
  selector:
    matchLabels:
      app: claude-code
  template:
    metadata:
      labels:
        app: claude-code
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: claude-code
          image: ghcr.io/pavlenkoa/claude-code:latest@sha256:866e495c627557351bffb114eca341e330f4c0b9403e232cbce4524f9c4caac6
          imagePullPolicy: Always
          workingDir: /home/claude/workspace
          command:
            - sh
            - -c
            - |
              set -e

              # Auto-update Claude Code CLI
              npm update -g @anthropic-ai/claude-code 2>/dev/null || true

              # Create .claude.json with pre-approved workspaces (skip trust dialog)
              if [ ! -f /home/claude/.claude/.claude.json ]; then
                cat > /home/claude/.claude/.claude.json << 'CJEOF'
              {
                "hasCompletedOnboarding": true,
                "projects": {
                  "/home/claude/workspace": {
                    "allowedTools": [],
                    "hasTrustDialogAccepted": true,
                    "hasClaudeMdExternalIncludesApproved": false
                  },
                  "/home/claude/.claude/plugins/cache/claude-plugins-official/telegram": {
                    "allowedTools": [],
                    "hasTrustDialogAccepted": true,
                    "hasClaudeMdExternalIncludesApproved": false
                  }
                }
              }
              CJEOF
              fi
              ln -sf /home/claude/.claude/.claude.json /home/claude/.claude.json

              # Setup workspace configs (overwrite on every start)
              mkdir -p /home/claude/workspace/.claude/skills/media
              cp /config-source/CLAUDE.md /home/claude/workspace/CLAUDE.md
              cp /config-source/SKILL.md /home/claude/workspace/.claude/skills/media/SKILL.md
              cp /config-source/mcp.json /home/claude/workspace/.mcp.json

              # Setup GitHub (GH_TOKEN env var handles gh CLI auth)
              # gh auth setup-git configures git to use gh as credential helper for HTTPS
              gh auth setup-git || true
              git config --global user.name "panclaude"
              git config --global user.email "269990661+panclaude@users.noreply.github.com"

              # Create telegram .env from secret (plugin reads token from here)
              mkdir -p /home/claude/.claude/channels/telegram
              echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" > /home/claude/.claude/channels/telegram/.env
              chmod 600 /home/claude/.claude/channels/telegram/.env

              # Enable telegram plugin + SessionStart hook.
              # The hook's stdout is injected as system context at session start,
              # prompting Claude to restore crons on first interaction.
              # (Hooks can inject context but cannot force immediate action — see
              # https://code.claude.com/docs/en/hooks)
              cat > /home/claude/.claude/settings.json << 'SEOF'
              {
                "enabledPlugins": {
                  "telegram@claude-plugins-official": true
                },
                "hooks": {
                  "SessionStart": [
                    {
                      "matcher": "startup",
                      "hooks": [
                        {
                          "type": "command",
                          "command": "echo 'STARTUP TASK: On first user interaction, immediately read /tracking/CRON.md and recreate every listed cron via CronCreate. Do this BEFORE handling the user message. Stay silent about the restoration — do not announce or message the user unless there is an error.'"
                        }
                      ]
                    }
                  ]
                }
              }
              SEOF

              # Wait for auth (one-time: kubectl exec -it -n claude-code claude-code-0 -- claude)
              while [ ! -f /home/claude/.claude/.credentials.json ]; do
                echo "Not authenticated. Run: kubectl exec -it -n claude-code claude-code-0 -- claude"
                sleep 30
              done

              # Ensure the telegram plugin is installed from the official marketplace.
              # claude-plugins-official is auto-registered and auto-updated by Claude Code,
              # so we only need to declare the install — no manual marketplace clone or
              # npm install. Idempotent: a no-op once installed.
              # https://code.claude.com/docs/en/discover-plugins
              claude plugin install telegram@claude-plugins-official 2>&1 | tail -5 || true

              # Start claude in a detached screen session
              # Attach: kubectl exec -it -n claude-code claude-code-0 -- screen -Ur claude
              # Detach: Ctrl+A, D
              screen -UdmS claude claude \
                --channels plugin:telegram@claude-plugins-official \
                --permission-mode acceptEdits \
                --allowedTools "Bash,Read,Write,Edit,Glob,Grep,Agent,WebFetch,WebSearch,mcp__plugin_telegram_telegram__reply,mcp__plugin_telegram_telegram__react,mcp__plugin_telegram_telegram__edit_message"

              # Keep container alive while screen runs
              exec tail -f /dev/null
          env:
            - name: TZ
              value: "Europe/Warsaw"
            - name: LANG
              value: "C.UTF-8"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-code-telegram
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_STATE_DIR
              value: /home/claude/.claude/channels/telegram
            - name: TOLOKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: claude-code-toloka
                  key: TOLOKA_USERNAME
            - name: TOLOKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-toloka
                  key: TOLOKA_PASSWORD
            - name: EMBY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-code-emby
                  key: EMBY_API_KEY
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-code-tmdb
                  key: TMDB_API_KEY
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-code-github
                  key: GH_TOKEN
            - name: SEEDPOOL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-code-seedpool
                  key: SEEDPOOL_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: claude-home
              mountPath: /home/claude/.claude
            - name: telegram-access
              mountPath: /home/claude/.claude/channels/telegram/access.json
              subPath: access.json
            - name: workspace
              mountPath: /home/claude/workspace
            - name: tracking
              mountPath: /tracking
            - name: media
              mountPath: /media
              subPath: emby
            - name: claude-config
              mountPath: /config-source
      volumes:
        - name: claude-home
          nfs:
            server: 192.168.88.3
            path: /media/claude-code/dot-claude
        - name: telegram-access
          secret:
            secretName: claude-code-telegram-access
        - name: workspace
          nfs:
            server: 192.168.88.3
            path: /media/claude-code/workspace
        - name: tracking
          nfs:
            server: 192.168.88.3
            path: /media/openclaw/workspace/tracking
        - name: media
          persistentVolumeClaim:
            claimName: claude-code-media-nfs
        - name: claude-config
          configMap:
            name: claude-code-config
