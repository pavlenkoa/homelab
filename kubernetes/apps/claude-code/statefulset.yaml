apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude-code
  namespace: claude-code
spec:
  serviceName: claude-code
  replicas: 1
  selector:
    matchLabels:
      app: claude-code
  template:
    metadata:
      labels:
        app: claude-code
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: claude-code
          image: ghcr.io/pavlenkoa/claude-code:latest
          imagePullPolicy: Always
          workingDir: /home/claude/workspace
          command:
            - sh
            - -c
            - |
              set -e

              # Auto-update Claude Code CLI
              npm update -g @anthropic-ai/claude-code 2>/dev/null || true

              # Create .claude.json with pre-approved workspaces (skip trust dialog)
              if [ ! -f /home/claude/.claude/.claude.json ]; then
                cat > /home/claude/.claude/.claude.json << 'CJEOF'
              {
                "hasCompletedOnboarding": true,
                "projects": {
                  "/home/claude/workspace": {
                    "allowedTools": [],
                    "hasTrustDialogAccepted": true,
                    "hasClaudeMdExternalIncludesApproved": false
                  },
                  "/home/claude/.claude/plugins/cache/claude-plugins-official/telegram": {
                    "allowedTools": [],
                    "hasTrustDialogAccepted": true,
                    "hasClaudeMdExternalIncludesApproved": false
                  }
                }
              }
              CJEOF
              fi
              ln -sf /home/claude/.claude/.claude.json /home/claude/.claude.json

              # Setup workspace configs (overwrite on every start)
              mkdir -p /home/claude/workspace/.claude/skills/media
              cp /config-source/CLAUDE.md /home/claude/workspace/CLAUDE.md
              cp /config-source/SKILL.md /home/claude/workspace/.claude/skills/media/SKILL.md
              cp /config-source/mcp.json /home/claude/workspace/.mcp.json

              # Create telegram .env from secret (plugin reads token from here)
              mkdir -p /home/claude/.claude/channels/telegram
              echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" > /home/claude/.claude/channels/telegram/.env
              chmod 600 /home/claude/.claude/channels/telegram/.env

              # Enable telegram plugin in settings
              cat > /home/claude/.claude/settings.json << 'SEOF'
              {
                "enabledPlugins": {
                  "telegram@claude-plugins-official": true
                }
              }
              SEOF

              # Auto-install/update telegram plugin from marketplace
              MARKETPLACE=/home/claude/.claude/plugins/marketplaces/claude-plugins-official
              PLUGIN_SRC=$MARKETPLACE/external_plugins/telegram
              CACHE=/home/claude/.claude/plugins/cache/claude-plugins-official/telegram

              if [ -d "$MARKETPLACE/.git" ]; then
                git -C "$MARKETPLACE" pull --ff-only 2>/dev/null || true
              else
                git clone https://github.com/anthropics/claude-plugins-official "$MARKETPLACE"
              fi

              LATEST_VER=$(cat "$PLUGIN_SRC/.claude-plugin/plugin.json" | grep '"version"' | head -1 | sed 's/.*"version".*"\([^"]*\)".*/\1/')
              INSTALLED_VER=""
              if [ -f /home/claude/.claude/plugins/installed_plugins.json ]; then
                INSTALLED_VER=$(cat /home/claude/.claude/plugins/installed_plugins.json | grep '"version"' | head -1 | sed 's/.*"version".*"\([^"]*\)".*/\1/')
              fi

              if [ "$LATEST_VER" != "$INSTALLED_VER" ] || [ ! -d "$CACHE/$LATEST_VER/node_modules" ]; then
                echo "Installing telegram plugin v$LATEST_VER (was: ${INSTALLED_VER:-none})"
                mkdir -p "$CACHE/$LATEST_VER"
                cp -r "$PLUGIN_SRC"/* "$CACHE/$LATEST_VER/"
                cp -r "$PLUGIN_SRC/.claude-plugin" "$CACHE/$LATEST_VER/"
                cp "$PLUGIN_SRC/.mcp.json" "$CACHE/$LATEST_VER/" 2>/dev/null || true
                cd "$CACHE/$LATEST_VER" && npm install --production
                NOW=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
                SHA=$(git -C "$MARKETPLACE" rev-parse HEAD)
                cat > /home/claude/.claude/plugins/installed_plugins.json << PEOF
              {
                "version": 2,
                "plugins": {
                  "telegram@claude-plugins-official": [{
                    "scope": "user",
                    "installPath": "$CACHE/$LATEST_VER",
                    "version": "$LATEST_VER",
                    "installedAt": "$NOW",
                    "lastUpdated": "$NOW",
                    "gitCommitSha": "$SHA"
                  }]
                }
              }
              PEOF
                cat > /home/claude/.claude/plugins/known_marketplaces.json << MEOF
              {
                "claude-plugins-official": {
                  "source": {"source": "github", "repo": "anthropics/claude-plugins-official"},
                  "installLocation": "$MARKETPLACE",
                  "lastUpdated": "$NOW"
                }
              }
              MEOF
              fi

              # Wait for auth (one-time: kubectl exec -it -n claude-code claude-code-0 -- claude)
              while [ ! -f /home/claude/.claude/.credentials.json ]; do
                echo "Not authenticated. Run: kubectl exec -it -n claude-code claude-code-0 -- claude"
                sleep 30
              done

              # Start claude in a detached screen session
              # Attach: kubectl exec -it -n claude-code claude-code-0 -- screen -r claude
              # Detach: Ctrl+A, D
              screen -dmS claude claude --channels plugin:telegram@claude-plugins-official \
                --permission-mode acceptEdits \
                --allowedTools "Bash,Read,Write,Edit,Glob,Grep,Agent,WebFetch,WebSearch,mcp__plugin_telegram_telegram__reply,mcp__plugin_telegram_telegram__react,mcp__plugin_telegram_telegram__edit_message"

              # Keep container alive while screen runs
              exec tail -f /dev/null
          env:
            - name: TZ
              value: "Europe/Kyiv"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-code-telegram
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_STATE_DIR
              value: /home/claude/.claude/channels/telegram
            - name: TOLOKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: claude-code-toloka
                  key: TOLOKA_USERNAME
            - name: TOLOKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-toloka
                  key: TOLOKA_PASSWORD
            - name: EMBY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-code-emby
                  key: EMBY_API_KEY
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-code-tmdb
                  key: TMDB_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: claude-home
              mountPath: /home/claude/.claude
            - name: telegram-access
              mountPath: /home/claude/.claude/channels/telegram/access.json
              subPath: access.json
            - name: workspace
              mountPath: /home/claude/workspace
            - name: tracking
              mountPath: /tracking
            - name: media
              mountPath: /media
              subPath: emby
              readOnly: true
            - name: claude-config
              mountPath: /config-source
      volumes:
        - name: claude-home
          nfs:
            server: 192.168.88.3
            path: /media/claude-code/dot-claude
        - name: telegram-access
          secret:
            secretName: claude-code-telegram-access
        - name: workspace
          nfs:
            server: 192.168.88.3
            path: /media/claude-code/workspace
        - name: tracking
          nfs:
            server: 192.168.88.3
            path: /media/openclaw/workspace/tracking
        - name: media
          persistentVolumeClaim:
            claimName: claude-code-media-nfs
        - name: claude-config
          configMap:
            name: claude-code-config
