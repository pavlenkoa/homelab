{{- range $serviceName, $serviceConfig := .Values.services }}
{{- if $serviceConfig.ingress }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $serviceName }}
  labels:
    {{- include "external-services.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName }}
spec:
  parentRefs:
    - name: {{ $.Values.global.gatewayName }}
      namespace: {{ $.Values.global.gatewayNamespace }}
  hostnames:
    - {{ $serviceConfig.ingress.host }}
  rules:
    - matches:
        - path:
            type: {{ $serviceConfig.ingress.pathType | default "PathPrefix" }}
            value: {{ $serviceConfig.ingress.path | default "/" }}
      backendRefs:
        - name: {{ $serviceName }}
          port: {{ $serviceConfig.service.port | default 80 }}
{{- end }}
{{- end }}
