apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kgateway-basic-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kgateway-basic-auth
  data:
    - secretKey: .htpasswd
      remoteRef:
        key: kv/kgateway
        property: htpasswd
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-basic-auth
spec:
  from:
    - group: gateway.kgateway.dev
      kind: TrafficPolicy
      namespace: kube-system
    - group: gateway.kgateway.dev
      kind: TrafficPolicy
      namespace: transmission
  to:
    - group: ""
      kind: Secret
