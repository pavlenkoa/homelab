apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: authelia
spec:
  type: ExtAuth
  extAuth:
    httpService:
      backendRef:
        name: authelia
        namespace: authelia
        port: 80
      pathPrefix: /api/authz/ext-authz
      authorizationRequest:
        headersToAdd:
          Host: "%REQ(:AUTHORITY)%"
          X-Forwarded-Proto: "%REQ(:SCHEME)%"
      authorizationResponse:
        headersToBackend:
          - Remote-User
          - Remote-Name
          - Remote-Email
          - Remote-Groups
    headersToForward:
      - cookie
      - authorization
      - proxy-authorization
