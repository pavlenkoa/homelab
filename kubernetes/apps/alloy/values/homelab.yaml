# Alloy configuration for homelab cluster
# Environment-specific overrides only

alloy:
  controller:
    # Run on all nodes including tainted raspberrypi
    tolerations:
      - key: dedicated
        operator: Equal
        value: media
        effect: NoSchedule

  alloy:
    configMap:
      content: |
        // Node metrics
        prometheus.exporter.unix "node" {
          disable_collectors = ["arp", "bcache", "bonding", "btrfs", "conntrack", "dmi", "edac", "entropy", "fibrechannel", "hwmon", "infiniband", "ipvs", "mdadm", "nfs", "nfsd", "nvme", "os", "powersupplyclass", "pressure", "rapl", "schedstat", "selinux", "softnet", "tapestats", "thermal_zone", "timex", "udp_queues", "watchdog", "xfs", "zfs"]
        }

        prometheus.scrape "node" {
          targets    = prometheus.exporter.unix.node.targets
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "node"
        }

        // Kubelet metrics
        discovery.kubernetes "nodes" {
          role = "node"
        }

        prometheus.scrape "kubelet" {
          targets    = discovery.kubernetes.nodes.targets
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "kubelet"
          scheme     = "https"
          bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          tls_config {
            ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            insecure_skip_verify = true
          }
        }

        // cAdvisor metrics from kubelet
        prometheus.scrape "cadvisor" {
          targets    = discovery.kubernetes.nodes.targets
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "cadvisor"
          scheme     = "https"
          metrics_path = "/metrics/cadvisor"
          bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          tls_config {
            ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            insecure_skip_verify = true
          }
        }

        // Transmission exporter metrics
        prometheus.scrape "transmission" {
          targets    = [{"__address__" = "transmission.transmission:19091"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "transmission"
        }

        // macOS host metrics (node_exporter via OrbStack host.internal)
        prometheus.scrape "macos" {
          targets    = [{"__address__" = "host.internal:9100"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "macos"
        }

        // Remote write to local VictoriaMetrics
        prometheus.remote_write "local" {
          external_labels = {
            cluster = "homelab",
          }
          endpoint {
            url = "http://victoriametrics-victoria-metrics-single-server.monitoring:8428/api/v1/write"
          }
        }

        // Pod log discovery
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }
        }

        // Collect pod logs
        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.process.filter.receiver]
        }

        // Filter out known noisy errors
        loki.process "filter" {
          // Drop cilium envoy version check errors (RPi4 doesn't support 48-bit VA)
          stage.drop {
            source         = ""
            expression     = ".*failed to retrieve Envoy version.*"
            drop_counter_reason = "cilium-envoy-version-check"
          }

          forward_to = [loki.write.local.receiver]
        }

        // Send logs to local Loki
        loki.write "local" {
          external_labels = {
            cluster = "homelab",
          }
          endpoint {
            url = "http://loki.monitoring:3100/loki/api/v1/push"
          }
        }
