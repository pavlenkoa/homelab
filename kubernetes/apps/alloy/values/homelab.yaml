# Alloy configuration for homelab cluster
# Environment-specific overrides only

alloy:
  controller:
    # Run on all nodes including tainted raspberrypi
    tolerations:
      - key: dedicated
        operator: Equal
        value: media
        effect: NoSchedule

  alloy:
    configMap:
      content: |
        // Node metrics
        prometheus.exporter.unix "node" {
          disable_collectors = ["arp", "bcache", "bonding", "btrfs", "conntrack", "dmi", "edac", "entropy", "fibrechannel", "hwmon", "infiniband", "ipvs", "mdadm", "nfs", "nfsd", "nvme", "os", "powersupplyclass", "pressure", "rapl", "schedstat", "selinux", "softnet", "tapestats", "thermal_zone", "timex", "udp_queues", "watchdog", "xfs", "zfs"]
        }

        prometheus.scrape "node" {
          targets    = prometheus.exporter.unix.node.targets
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "node"
        }

        // Kubelet metrics
        discovery.kubernetes "nodes" {
          role = "node"
        }

        prometheus.scrape "kubelet" {
          targets    = discovery.kubernetes.nodes.targets
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "kubelet"
          scheme     = "https"
          bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          tls_config {
            ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            insecure_skip_verify = true
          }
        }

        // cAdvisor metrics from kubelet
        prometheus.scrape "cadvisor" {
          targets    = discovery.kubernetes.nodes.targets
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "cadvisor"
          scheme     = "https"
          metrics_path = "/metrics/cadvisor"
          bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          tls_config {
            ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            insecure_skip_verify = true
          }
        }

        // Transmission exporter metrics
        prometheus.scrape "transmission" {
          targets    = [{"__address__" = "transmission.transmission:19091"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "transmission"
        }

        // macOS host metrics (node_exporter via OrbStack host.internal)
        prometheus.scrape "macos" {
          targets    = [{"__address__" = "host.internal:9100"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "macos"
        }

        // MikroTik router metrics (mktxp exporter)
        prometheus.scrape "mikrotik" {
          targets    = [{"__address__" = "mktxp.monitoring:49090"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "mikrotik"
        }

        // kube-state-metrics
        prometheus.scrape "kube_state_metrics" {
          targets    = [{"__address__" = "kube-state-metrics.monitoring:8080"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "kube-state-metrics"
        }

        // ArgoCD metrics
        prometheus.scrape "argocd_server" {
          targets    = [{"__address__" = "argocd-server.argocd:8083"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "argocd-server"
        }

        prometheus.scrape "argocd_app_controller" {
          targets    = [{"__address__" = "argocd-application-controller.argocd:8082"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "argocd-app-controller"
        }

        prometheus.scrape "argocd_repo_server" {
          targets    = [{"__address__" = "argocd-repo-server.argocd:8084"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "argocd-repo-server"
        }

        // Cilium agent metrics (DaemonSet on both nodes)
        prometheus.scrape "cilium_agent" {
          targets    = [
            {"__address__" = "192.168.139.81:9962", "instance" = "macmini"},
            {"__address__" = "192.168.88.3:9962", "instance" = "raspberrypi"},
          ]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "cilium-agent"
        }

        // Cilium operator metrics
        prometheus.scrape "cilium_operator" {
          targets    = [{"__address__" = "cilium-operator.kube-system:9963"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "cilium-operator"
        }

        // VictoriaMetrics self-monitoring
        prometheus.scrape "victoriametrics" {
          targets    = [{"__address__" = "victoriametrics-victoria-metrics-single-server.monitoring:8428"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "victoriametrics"
          metrics_path = "/metrics"
        }

        // Loki self-monitoring
        prometheus.scrape "loki" {
          targets    = [{"__address__" = "loki.monitoring:3100"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "loki"
          metrics_path = "/metrics"
        }

        // kgateway metrics
        prometheus.scrape "kgateway" {
          targets    = [{"__address__" = "kgateway.kgateway-system:9092"}]
          forward_to = [prometheus.remote_write.local.receiver]
          job_name   = "kgateway"
        }

        // Remote write to local VictoriaMetrics
        prometheus.remote_write "local" {
          external_labels = {
            cluster = "homelab",
          }
          endpoint {
            url = "http://victoriametrics-victoria-metrics-single-server.monitoring:8428/api/v1/write"
          }
        }

        // Pod log discovery
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }
        }

        // Collect pod logs
        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.process.filter.receiver]
        }

        // Filter out known noisy errors
        loki.process "filter" {
          // Drop cilium envoy version check errors (RPi4 doesn't support 48-bit VA)
          stage.drop {
            source         = ""
            expression     = ".*failed to retrieve Envoy version.*"
            drop_counter_reason = "cilium-envoy-version-check"
          }

          forward_to = [loki.write.local.receiver]
        }

        // Send logs to local Loki
        loki.write "local" {
          external_labels = {
            cluster = "homelab",
          }
          endpoint {
            url = "http://loki.monitoring:3100/loki/api/v1/push"
          }
        }
